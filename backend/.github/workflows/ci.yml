name: backend-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: backend
        run: npm install
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: test_access
          JWT_REFRESH_SECRET: test_refresh
        run: npm run test
